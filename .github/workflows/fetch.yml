name: Fetch leaderboard

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 50

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Run fetch script
        run: node fetch.js
        env:
          TWITTERAPI_KEY: ${{ secrets.TWITTERAPI_KEY }}

      - name: Commit updated leaderboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/leaderboard.json
          git diff --staged --quiet || git commit -m "chore: update leaderboard $(date -u +%Y-%m-%d)"
          git push
