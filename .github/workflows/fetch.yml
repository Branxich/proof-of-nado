name: Fetch leaderboard

on:
  schedule:
    - cron: '0 6 * * *'   # каждый день в 06:00 UTC
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install node-fetch

      - name: Run fetch
        env:
          TWITTERAPI_KEY: ${{ secrets.TWITTERAPI_KEY }}
        run: node fetch.js

      - name: Commit updated leaderboard
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/leaderboard.json
          git diff --staged --quiet || git commit -m "chore: update leaderboard"
          git push
